# Yantage — Docker Compose
# Usage:
#   docker compose up --build          # first run (builds images)
#   docker compose up -d               # start in background
#   docker compose down                # stop
#   docker compose down -v             # stop + delete data volume (⚠️ wipes DB)
#
# Access:
#   Dashboard  → http://localhost:3001
#   API docs   → http://localhost:8000/docs

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Named volume keeps SQLite DB files + config.json across container
      # rebuilds. Remove the volume only if you want a fresh database.
      - yantage_data:/data
    environment:
      YANTAGE_DATA_DIR: /data
      # Allow the frontend container (and browser through it) to call the API
      ALLOWED_ORIGINS: "http://localhost:3001"
      LOG_LEVEL: INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Passed at build time so next.config.ts bakes in the rewrite target
        INTERNAL_API_URL: http://backend:8000/api
    ports:
      - "3001:3001"
    environment:
      # Used at runtime by lib/api.ts for SSR fetches
      INTERNAL_API_URL: http://backend:8000/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  yantage_data:
    driver: local
